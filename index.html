<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quick Links</title>
  <style>
    :root {
      --bg-1: #fff9f2;
      --bg-2: #eaf7ff;
      --panel: rgba(255, 255, 255, 0.82);
      --text: #1f2937;
      --muted: #4b5563;
      --border-1: #f9b4c7;
      --border-2: #9fd8c5;
      --shadow: rgba(71, 85, 105, 0.22);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 5%, rgba(255, 193, 217, 0.55), transparent 35%),
        radial-gradient(circle at 90% 0%, rgba(173, 230, 214, 0.6), transparent 33%),
        linear-gradient(180deg, var(--bg-2), var(--bg-1));
    }

    .wrap {
      width: min(980px, calc(100% - 32px));
      margin: 0 auto;
      padding: 26px 0 36px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(2rem, 4vw, 3.2rem);
      line-height: 1.05;
    }

    .intro {
      margin: 0 0 24px;
      font-size: clamp(1rem, 2.2vw, 1.3rem);
      color: var(--muted);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 16px;
    }

    .link-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 112px;
      padding: 18px;
      border-radius: 20px;
      border: 2px solid var(--border-1);
      background: var(--panel);
      color: var(--text);
      text-decoration: none;
      text-align: center;
      font-size: clamp(1.15rem, 2.4vw, 1.65rem);
      font-weight: 700;
      box-shadow: 0 12px 24px var(--shadow);
      transition: transform 0.12s ease, box-shadow 0.12s ease;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .sub {
      margin-top: 4px;
      font-size: 0.82em;
      font-weight: 600;
      opacity: 0.8;
    }

    .link-btn:nth-child(even) {
      border-color: var(--border-2);
    }

    .link-btn:hover,
    .link-btn:focus-visible {
      transform: translateY(-2px);
      box-shadow: 0 16px 28px rgba(71, 85, 105, 0.3);
      outline: none;
    }

    .link-btn:active {
      transform: translateY(1px);
    }

    @media (max-width: 640px) {
      .wrap {
        width: min(100% - 20px, 680px);
        padding-top: 20px;
      }

      .link-btn {
        min-height: 96px;
        border-radius: 16px;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Quick Links</h1>
    <p class="intro">Tap a button to open what you need.</p>

    <section class="grid" aria-label="Quick links">
      <a class="link-btn" href="https://bittervine.github.io/Bittevine/index.html">
        <span>Minor HTML and JavaScript Things</span>
        <span class="sub">(GitHub)</span>
      </a>
      <a class="link-btn" href="https://github.com/Bittervine/DOOM_II_Stuff" target="_blank" rel="noopener noreferrer">
        <span>Procedural DOOM II PWAD Generator</span>
        <span class="sub">(GitHub)</span>
      </a>
      <a class="link-btn" href="https://smygehukochnorrut.blogspot.com/" target="_blank" rel="noopener noreferrer">
        <span>Smygehuk & Norrut</span>
        <span>(Blogger)</span>
      </a>
    </section>
  </main>
</body>
</html>
